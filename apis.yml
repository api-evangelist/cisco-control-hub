description: >-
  Cisco Control Hub is the administration console for Webex services.
  Programmatic access is delivered through the Webex Admin and adjacent
  REST APIs at webexapis.com — covering people, organizations, locations,
  workspaces, devices, licenses, calling configuration, audit events, and
  analytics reports. Authentication uses OAuth 2.0 access tokens or
  service-app tokens scoped to the organization.
apis:
  - aid: cisco-control-hub:webex-admin-api
    name: Webex Admin API
    tags:
      - Administration
      - Audit
      - Organizations
      - Users
    humanURL: https://developer.webex.com/docs/api/v1/admin-audit-events
    baseURL: https://webexapis.com/v1
    properties:
      - url: https://developer.webex.com/docs/api/v1/admin-audit-events
        type: Documentation
      - url: https://developer.webex.com/docs/api/v1/openapi.json
        type: OpenAPI
      - url: https://developer.webex.com/docs/getting-started#accounts-and-authentication
        type: Authentication
    description: >-
      Manage users, licenses, organization settings, and admin audit
      events for a Webex organization.
  - aid: cisco-control-hub:webex-calling-api
    name: Webex Calling API
