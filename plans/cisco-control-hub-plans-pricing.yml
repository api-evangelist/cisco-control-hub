specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Cisco Control Hub
providerId: cisco-control-hub
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Administration
  - Calling
  - Collaboration
  - Communications
  - Device Management
  - Identity Management
  - Licenses
